name: Aviso ETFs

on:
  schedule:
    # Se ejecuta de Lunes a Viernes a las 10:01 UTC (Ajusta según tu mercado)
    - cron: '33 16 * * *'
  workflow_dispatch: # Esto te permite ejecutar el script manualmente desde GitHub cuando quieras

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar script de Python
      env:
        # Aquí mapeamos de forma ultra segura tus secretos de GitHub al script
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python Seguimiento_diario_SMA90_A.py
